<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chanakya University - Event Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .btn-primary { background-color: #003366; border: none; }
        .btn-primary:hover { background-color: #002244; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold">Event Statistics Portal</h2>
                        <p class="text-muted">Log new event data for Chanakya University</p>
                    </div>
                    
                    <form action="/submit_event" method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Event Name</label>
                            <input type="text" name="event_name" class="form-control" placeholder="e.g. Ojas 2026" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Organizing School</label>
                                <select name="department" id="schoolSelect" class="form-select" onchange="checkSchool()" required>
                                    <option value="" disabled selected>Select School</option>
                                    {% for school in schools %}
                                    <option value="{{ school }}">{{ school }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6 mb-3 d-none" id="branchSection">
                                <label class="form-label fw-semibold">Engineering Branch</label>
                                <select name="branch" class="form-select">
                                    {% for branch in branches %}
                                    <option value="{{ branch }}">{{ branch }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Category</label>
                                <select name="category" class="form-select">
                                    <option value="Technical">Technical</option>
                                    <option value="Cultural">Cultural</option>
                                    <option value="Workshop">Workshop</option>
                                    <option value="Sports">Sports</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Event Date</label>
                                <input type="date" name="event_date" class="form-control" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Venue</label>
                            <input type="text" name="venue" class="form-control" placeholder="e.g. Seminar Hall 1">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Organizer Name</label>
                            <input type="text" name="organizer" class="form-control" placeholder="Prof. Name">
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2">Log Event Data</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="/dashboard" class="text-decoration-none">View Actionable Insights →</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function checkSchool() {
            const school = document.getElementById("schoolSelect").value;
            const branchSection = document.getElementById("branchSection");
            if (school === "School of Engineering") {
                branchSection.classList.remove("d-none");
            } else {
                branchSection.classList.add("d-none");
            }
        }
    </script>
</body>
</html>
