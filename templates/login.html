<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coordinator Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="landing-body">
    <div class="container" style="max-width: 400px; margin: 80px auto; text-align: center;">
        <div class="logo-circle" style="width: 80px; height: 80px; font-size: 30px;"><i class="fa-solid fa-lock"></i></div>
        <h1 style="margin-bottom: 30px;">Coordinator Login</h1>

        <div class="card">
            <form method="POST" action="/login">
                <div class="form-group" style="text-align: left;">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter Coordinator Password" required>
                </div>
                <button type="submit" style="width: 100%; margin-top: 15px;"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
            </form>

            {% if error %}
            <p style="color: var(--danger); margin-top: 15px; font-weight: 600;"><i class="fa-solid fa-circle-exclamation"></i> {{ error }}</p>
            {% endif %}
        </div>
        
        <a href="/" style="color: var(--text-muted); text-decoration: none; display: inline-block; margin-top: 20px;"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    </div>
</body>
</html>
